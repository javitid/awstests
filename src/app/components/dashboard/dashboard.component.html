<div class="main">
  <app-header></app-header>
  <div class="details">
    @for (question of quizState.filteredQuestions(); track question.id; let index = $index) {
      <div>
        <form [formGroup]="quizState.questionsForm()">
          <app-question
            [questionNumber]="index+1"
            [question]="question"
            [questionControlName]="question.id.toString()">
          </app-question>
        </form>
      </div>
    }
  </div>
</div>
