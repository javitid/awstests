<div>
  <mat-card *ngIf="!firebaseConfigured">
    <mat-card-content>
      <h2>Firebase pendiente</h2>
      <p>
        Rellena la configuracion en <code>src/environments/environment*.ts</code>
        para activar Google, invitado y email/password.
      </p>
    </mat-card-content>
  </mat-card>

  <mat-card>
    <mat-card-content>
      <h2>Entrar</h2>
      <div class="login-actions">
        <button type="button" mat-raised-button color="primary" (click)="loginWithGoogle()" [disabled]="!firebaseConfigured">
          Continuar con Google
        </button>
        <button type="button" mat-stroked-button color="primary" (click)="continueAsGuest()" [disabled]="!firebaseConfigured">
          Entrar como invitado
        </button>
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <h2>Email y password</h2>
        <mat-form-field>
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" required>
          <mat-error>
            Please provide a valid email address
          </mat-error>
        </mat-form-field>
        <mat-form-field>
          <mat-label>Password</mat-label>
          <input matInput [type]="isPwdHidden ? 'password' : 'text'" formControlName="password" required>
          <mat-icon matSuffix (click)="isPwdHidden = !isPwdHidden">{{isPwdHidden ? 'visibility_off' : 'visibility'}}</mat-icon>
          <mat-error>
            Please provide a valid password
          </mat-error>
        </mat-form-field>
        <div class="login-actions">
          <button type="submit" [disabled]="!form.valid || !firebaseConfigured" mat-raised-button color="primary">
            Login
          </button>
          <a routerLink="/register">Register</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
